<div class="main-slider w-full flex flex-col justify-center items-center overflow-hidden">
  <!--Container For Image Slider-->
  <div class="carousel-container w-full h-48 sm:h-64 md:h-80 lg:h-96 overflow-hidden relative justify-center max-w-full">

  <img class="w-full h-full block object-center transition duration-500 ease-in-out max-w-full" [src]="images[currentIndex()]" alt="">
  <button (click)="nextSlide()" id="slider-button-right" class="swiper-button-next absolute p-2 flex justify-center items-center border border-solid border-primary w-6 h-6 sm:w-8 sm:h-8 md:w-10 md:h-10 transition-all duration-500 rounded-full top-1/2 -translate-y-1/2 right-1 sm:right-2 md:right-4 hover:bg-main cursor-pointer">
   <img src="images/rightArrow.svg" class="slider-btn w-3 h-3 sm:w-4 sm:h-4 md:w-5 md:h-5 lg:w-6 lg:h-6">
 </button>

 <button (click)="prevSlide()" id="slider-button-left" class="swiper-button-prev absolute p-2 flex justify-center items-center border border-solid border-primary w-6 h-6 sm:w-8 sm:h-8 md:w-10 md:h-10 transition-all duration-500 rounded-full top-1/2 -translate-y-1/2 left-1 sm:left-2 md:left-4 hover:bg-main cursor-pointer">
   <img src="images/leftArrow.svg" class="slider-btn w-3 h-3 sm:w-4 sm:h-4 md:w-5 md:h-5 lg:w-6 lg:h-6">
 </button>

 </div>
 <!---Container For the Dots-->
 <div class="flex justify-center items-center gap-1.5 sm:gap-2 py-2 sm:py-3">
  <!--Loop through the images-->
  <!-- Made individual dots responsive with size classes -->
  <span *ngFor="let image of images; let i = index;"
  (click)="currentIndex.set(i)" 
  [class.bg-accent]="i === currentIndex()" 
  [class.bg-amber-100]="i !== currentIndex()"
  class="w-2.5 h-2.5 sm:w-3 sm:h-3 md:w-4 md:h-4 rounded-full cursor-pointer transition-colors duration-300"
  ></span>
 </div>
</div>

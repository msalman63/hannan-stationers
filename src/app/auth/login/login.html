<div class="loginpage min-h-screen w-full grad-dark-hero flex items-center justify-center">
  <div
    class="loginform w-11/12 sm:w-5/6 lg:w-3/5 xl:w-2/5 2xl:w-1/3 max-w-2xl mx-auto bg-overlay-white-7 border border-white/12 p-4 sm:p-6 md:p-8 lg:p-10 rounded-lg shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-300"
  >
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-content flex flex-col justify-between items-center gap-3">
        <!-- Heading -->
        <h1
          class="heading text-2xl md:text-4xl font-extrabold font-heading text-white text-center leading-tight mb-4"
        >
          Admin Login
        </h1>

        <!-- Email Field -->
        <div class="email flex flex-col gap-1 sm:gap-1.5 md:gap-2 w-full">
          <label
            for="email"
            class="font-semibold font-heading text-sm sm:text-base md:text-lg text-white-muted"
          >
            Email
          </label>
          <input
            id="email"
            class="inputField w-full text-xs sm:text-sm md:text-base font-normal text-white-muted font-body border border-white/30 rounded p-2 md:p-2.5 lg:p-3 focus:outline-1 focus:outline-white-dim"
            type="email"
            placeholder="Enter your email"
            formControlName="email"
          />

          <!-- Email Errors -->
          <div
            *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
            class="mt-1 w-full"
          >
            <small
              class="text-red-600 font-body block text-xs sm:text-sm md:text-base"
              *ngIf="loginForm.get('email')?.hasError('required')"
            >
              Email is required
            </small>
            <small
              class="text-red-600 font-body block text-xs sm:text-sm md:text-base"
              *ngIf="loginForm.get('email')?.hasError('email')"
            >
              Please enter a valid Email
            </small>
          </div>
        </div>

        <!-- Password Field -->
        <div class="password flex flex-col gap-1 sm:gap-1.5 md:gap-2 w-full">
          <label
            for="password"
            class="font-semibold font-heading text-sm sm:text-base md:text-lg text-white-muted"
          >
            Password
          </label>
          <input
            id="password"
            class="inputField w-full text-xs sm:text-sm md:text-base font-normal text-white-muted font-body border border-white/30 rounded p-2 md:p-2.5 lg:p-3 focus:outline-1 focus:outline-white-dim"
            type="password"
            placeholder="Enter your password"
            formControlName="password"
          />

          <!-- Password Errors -->
          <div
            *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
            class="mt-1 w-full"
          >
            <small
              class="text-red-600 font-body block text-xs sm:text-sm md:text-base"
              *ngIf="loginForm.get('password')?.hasError('required')"
            >
              Password is required
            </small>
            <small
              class="text-red-600 font-body block text-xs sm:text-sm md:text-base"
              *ngIf="loginForm.get('password')?.hasError('minlength')"
            >
              Password must be at least 8 characters.
            </small>
          </div>
        </div>

        <!--Submit Button -->
        <button
          class="w-full mt-4 px-6 sm:px-6 md:px-8 lg:px-10 py-2 grad-amber-btn font-heading font-normal text-sm sm:text-base md:text-lg text-white rounded-lg shadow-sm cursor-pointer hover:shadow-md transition-colors duration-300 disabled:bg-overlay-white-7 disabled:border disabled:border-white/20 disabled:cursor-not-allowed sm:w-auto"
          type="submit"
          [disabled]="loginForm.invalid || isLoading"
        >
          {{ isLoading ? 'Loading...' : 'LOG IN' }}
        </button>
      </div>
    </form>
  </div>
</div>
